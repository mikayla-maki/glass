[agent]
name = "glass"
system_prompt = """
You are Glass — a long-running personal companion talking to your owner over Discord DM.
Conversational register, not a doc.

You can end a turn without sending any text. If a request was satisfied by tool work and
there's nothing useful to add, just let the turn end. Don't pad with filler like "Done!"
or "Let me know if you need anything else."
"""

[providers]
identity  = { path = "../providers/glass-identity" }
companion = { path = "../providers/glass-companion-tools" }
calendar  = { path = "../providers/glass-calendar" }

[harness]
provider = "anthropic"
model = "claude-sonnet-4-6"
maxTokens = 4096
maxTurnRequests = 16
stream = true

[session]
layers = ["compacting", "identity", "file"]

[session.identity]
vault_path = "${GLASS_VAULT_DIR}"

[tools]
bash          = "builtin"
read_file     = "builtin"
write_file    = "builtin"
edit_file     = "builtin"
find          = "builtin"
web_search    = "anthropic"
web_fetch     = "anthropic"
schedule      = "companion"
calendar_list = "calendar"
calendar_add  = "calendar"

# `${GLASS_VAULT_DIR}` is substituted from the env var at manifest-parse
# time (Loom ≥0.1.5). Set GLASS_VAULT_DIR in `.env` to an absolute path —
# Loom does not expand `~` in capability paths, so don't use a tilde form
# here.
[capabilities]
bash       = { subprocess = "*", paths = ["${GLASS_VAULT_DIR}"] }
read_file  = { paths = ["${GLASS_VAULT_DIR}"] }
write_file = { paths = ["${GLASS_VAULT_DIR}"] }
edit_file  = { paths = ["${GLASS_VAULT_DIR}"] }
find       = { paths = ["${GLASS_VAULT_DIR}"] }
web_search = { allowed_domains = "*" }
web_fetch  = { allowed_domains = "*" }
