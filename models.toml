# Glass model selection.
#
# Edit `selected` to switch models. Pi reads ANTHROPIC_API_KEY from your env
# (set in `.env`); the values below tell Pi which model to use and tell Glass
# how big the context window is so it knows when to compact.

selected = "sonnet-4.6"

[models."sonnet-4.6"]
pi_arg = "claude-sonnet-4-6"
context_window_tokens = 1000000
compaction_threshold_pct = 0.85   # compact at ~850k tokens
keep_recent_tokens = 100000

[models."opus-4.7"]
pi_arg = "claude-opus-4-7"
context_window_tokens = 1000000
compaction_threshold_pct = 0.85
keep_recent_tokens = 100000

[models."haiku-4.5"]
pi_arg = "claude-haiku-4-5"
context_window_tokens = 200000
compaction_threshold_pct = 0.70
keep_recent_tokens = 30000
